version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: customerEQ-postgres
    environment:
      POSTGRES_USER: customerEQ
      POSTGRES_PASSWORD: customerEQ
      POSTGRES_DB: customerEQ
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U customerEQ']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: customerEQ-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
