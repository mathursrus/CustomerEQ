build:
  name: iOS Preview (pnpm monorepo)
  steps:
    - eas/checkout
    - run:
        name: Set monorepo project root
        command: set-env EXPO_MONOREPO_PACKAGE_ROOT apps/mobile
    - run:
        name: Install mobile dependencies
        command: pnpm install --filter "@customerEQ/mobile" --ignore-scripts
    - eas/prebuild
    - eas/build
