name: Deploy to Azure Container Apps

# Deploy runs only after CI succeeds on main — closes the gap where a
# commit that broke typecheck / lint / smoke tests could still reach prod
# because deploy ran in parallel with CI rather than downstream of it.
# Manual workflow_dispatch is preserved for hotfix / recovery flows.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Serialize prod deploys so back-to-back merges queue instead of racing
# each other on `az containerapp update`. `cancel-in-progress: false` is
# deliberate — every merged commit should still ship, just in order.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: customereqcr.azurecr.io
  RESOURCE_GROUP: customereq-prod
  ENVIRONMENT: customereq-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI succeeded. On workflow_dispatch there's no
    # workflow_run event, so fall through to the manual path.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Under workflow_run, github.sha points at the default branch
          # tip when the run was dispatched, not the commit CI tested.
          # head_sha is the CI-tested commit; fall back to github.sha
          # for workflow_dispatch (no workflow_run event present).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Need HEAD~1 locally for the paths-filter base comparison below
          # (issue #343). Default fetch-depth is 1, which has no parent.
          fetch-depth: 2

      # Issue #343: skip ACR build + Container Apps redeploy on doc-only
      # commits. workflow_run triggers cannot use paths-ignore at the
      # trigger level (GitHub Actions limitation), so the gate runs as
      # the first job step against HEAD~1 (every main commit is a squash
      # merge, so the immediate parent is the right diff baseline). Same
      # skip-list semantics as ci.yml docker-build: under-build = stale
      # prod deploy = real bug; over-build = a few minutes of wasted CD,
      # so the failure direction is biased correctly. On workflow_dispatch
      # the diff against HEAD~1 will typically be non-empty across many
      # files, so the manual recovery path effectively always proceeds.
      #
      # Issue #347 (this fix): originally used dorny/paths-filter@v3 with
      # `base: HEAD~1`, but on workflow_run events dorny ALSO resolves
      # the default branch ref to anchor a merge-base call, which fails
      # under the detached-HEAD-by-SHA checkout this job uses (`git
      # merge-base HEAD~1 main` → exit 128 because `main` isn't a local
      # ref). Replaced with a direct `git diff` shell step — semantics
      # identical to ci.yml's filter (same skip set), no third-party
      # action, no merge-base resolution required.
      - name: Determine if deploy is needed
        id: changes
        shell: bash
        run: |
          SKIP_PATTERN='^(.*\.md|docs/.*|\.github/ISSUE_TEMPLATE/.*|\.github/pull_request_template\.md|CODEOWNERS|\.gitattributes|LICENSE)$'
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files between HEAD~1 and HEAD:"
          echo "$CHANGED" | sed 's/^/  /'
          if [ -z "$CHANGED" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Result: no diff; skipping deploy."
          elif echo "$CHANGED" | grep -qvE "$SKIP_PATTERN"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Result: at least one non-doc file changed; deploy required."
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Result: all changes match the doc-only skip set; skipping deploy."
          fi

      # Issue #351 (this fix): the previous `run: echo "...issue #343..."`
      # single-line form was truncated by the YAML parser at the `#` (inline
      # comment). Bash received an unterminated string and exited 2, failing
      # the job on every doc-only main commit (commit 7e83b076 was the first
      # observed failure). Literal block scalar (|) preserves the value
      # verbatim. The `#` was also dropped from the message text (now
      # "issue 343") as a defense against future single-line refactors
      # reintroducing the bug.
      - name: Skip if doc-only
        if: steps.changes.outputs.build == 'false'
        run: |
          echo "Doc-only change; skipping ACR build + Container Apps redeploy (issue 343)."

      - name: Log in to Azure
        if: steps.changes.outputs.build == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        if: steps.changes.outputs.build == 'true'
        run: az acr login --name customereqcr

      - name: Build and push API image
        if: steps.changes.outputs.build == 'true'
        run: |
          az acr build --registry customereqcr \
            --image customereq-api:${{ github.event.workflow_run.head_sha || github.sha }} \
            --image customereq-api:latest \
            --file Dockerfile.api .

      - name: Build and push Worker image
        if: steps.changes.outputs.build == 'true'
        run: |
          az acr build --registry customereqcr \
            --image customereq-worker:${{ github.event.workflow_run.head_sha || github.sha }} \
            --image customereq-worker:latest \
            --file Dockerfile.worker .

      - name: Build and push Web image
        if: steps.changes.outputs.build == 'true'
        run: |
          API_FQDN=$(az containerapp show --name customereq-api --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          az acr build --registry customereqcr \
            --image customereq-web:${{ github.event.workflow_run.head_sha || github.sha }} \
            --image customereq-web:latest \
            --file Dockerfile.web \
            --build-arg NEXT_PUBLIC_API_URL="https://$API_FQDN" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            .

      - name: Build and push Demo Storefront image
        if: steps.changes.outputs.build == 'true'
        run: |
          API_FQDN=$(az containerapp show --name customereq-api --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          az acr build --registry customereqcr \
            --image customereq-demo:${{ github.event.workflow_run.head_sha || github.sha }} \
            --image customereq-demo:latest \
            --file Dockerfile.demo-storefront \
            --build-arg NEXT_PUBLIC_DEMO_API_URL="https://$API_FQDN" \
            .

      - name: Deploy API
        if: steps.changes.outputs.build == 'true'
        run: |
          az containerapp update \
            --name customereq-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/customereq-api:${{ github.event.workflow_run.head_sha || github.sha }}

      # Non-secret env vars on the API container app. SUPPORT_EMAIL is the
      # public address surfaced on /admin/settings/organization (Developer
      # & Support row + the Member identification locked notice) per #292.
      # Reasserted on every deploy so the value is declarative and survives
      # container-app recreation. Plain --set-env-vars (not Key Vault) is
      # correct here — this is a public address, not a secret. --set-env-vars
      # is additive, leaving any other env vars on the app untouched.
      - name: Set API non-secret env vars
        if: steps.changes.outputs.build == 'true'
        run: |
          az containerapp update \
            --name customereq-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars SUPPORT_EMAIL=support@customereq.wellnessatwork.me

      - name: Deploy Worker
        if: steps.changes.outputs.build == 'true'
        run: |
          az containerapp update \
            --name customereq-worker \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/customereq-worker:${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy Web
        if: steps.changes.outputs.build == 'true'
        run: |
          az containerapp update \
            --name customereq-web \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/customereq-web:${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy Demo Storefront
        if: steps.changes.outputs.build == 'true'
        run: |
          az containerapp update \
            --name customereq-demo \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/customereq-demo:${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Verify API health
        if: steps.changes.outputs.build == 'true'
        run: |
          API_FQDN=$(az containerapp show --name customereq-api --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$API_FQDN/healthz" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "API health check failed"
          exit 1

      # Issue #388: canary probes run after the startup health check confirms
      # the container is up. Acceptable statuses prove the route is registered
      # and auth middleware is wired — 401 is a pass for authenticated endpoints.
      # 500 or connection errors are the failure signal. No canary credentials
      # are required: the 401-as-pass strategy is sufficient for route-level
      # health without needing Key Vault-stored test tokens.
      - name: Canary API checks
        if: steps.changes.outputs.build == 'true'
        run: |
          API_FQDN=$(az containerapp show --name customereq-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          BASE="https://$API_FQDN"

          check() {
            local label=$1 url=$2 method=${3:-GET}
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X "$method" "$url")
            if [[ "$STATUS" == "200" || "$STATUS" == "401" || "$STATUS" == "202" || "$STATUS" == "404" ]]; then
              echo "  ✓ $label → $STATUS"
            else
              echo "  ✗ $label → $STATUS (unexpected)"
              exit 1
            fi
          }

          # P0 — container up, DB reachable, auth middleware wired, event pipeline alive
          check "GET /healthz"        "$BASE/healthz"
          check "GET /v1/programs"    "$BASE/v1/programs"
          check "GET /v1/surveys"     "$BASE/v1/surveys"
          check "POST /v1/events"     "$BASE/v1/events" POST

          # P1 — schema-sensitive: confirms migration tables exist (catches #262-class failures)
          check "GET /v1/surveys/:id/imports" "$BASE/v1/surveys/_canary_/imports"
          check "GET /v1/members/me/balance"  "$BASE/v1/members/me/balance"
          check "GET /v1/analytics/cx"        "$BASE/v1/analytics/cx"
