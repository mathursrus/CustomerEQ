name: CI Metrics

on:
  schedule:
    # Runs at 01:00 UTC daily — one hour before nightly-regression.yml
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write  # to commit docs/ci-cd-metrics.md
  actions: read    # to read CI run history via GitHub API

jobs:
  generate-report:
    name: Generate CI trend report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the commit can push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate CI metrics report
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci-metrics.mjs

      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ci-cd-metrics.md docs/ci-metrics.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(metrics): update CI metrics report [skip ci]"
            git push
          fi
