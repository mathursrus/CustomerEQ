name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg16 — required by migration 20260403000000_add_kb_articles
        # (CREATE EXTENSION vector). Mirrors local docker-compose per ADR-0002 / R20.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: customerEQ
          POSTGRES_PASSWORD: customerEQ
          POSTGRES_DB: customerEQ_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @customerEQ/database exec prisma validate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      - name: Check enum migration coverage
        run: bash packages/database/scripts/check-enum-migrations.sh

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      # Regression gate for #270: every prior CI run skipped `migrate deploy`,
      # so a non-idempotent migration could land and only break on contributor
      # `pnpm db:reset` and on prod restore-from-migrations. Running the full
      # history against an empty postgres on every PR catches that class.
      - name: Run migrations (regression gate for #270)
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Install Playwright browsers
        run: pnpm --filter @customerEQ/web exec playwright install --with-deps chromium

      - name: Validate smoke test secrets
        run: |
          test -n "$AZURE_OPENAI_API_KEY" || test -n "$OPENAI_API_KEY" || (echo "Missing AZURE_OPENAI_API_KEY / OPENAI_API_KEY" && exit 1)
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare smoke test env
        run: |
          if [ -n "$AZURE_OPENAI_API_KEY" ]; then
            echo "AZURE_OPENAI_API_KEY=$AZURE_OPENAI_API_KEY" >> "$GITHUB_ENV"
          else
            echo "AZURE_OPENAI_API_KEY=$OPENAI_API_KEY" >> "$GITHUB_ENV"
          fi
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Start demo storefront dependencies
        run: |
          wait_for_url() {
            local url="$1"
            local label="$2"
            local log_file="$3"
            for _ in $(seq 1 90); do
              if curl -fsS "$url" >/dev/null; then
                return 0
              fi
              sleep 2
            done
            echo "$label failed to start"
            cat "$log_file"
            return 1
          }

          pnpm --filter @customerEQ/api dev:inline >/tmp/ceq-demo-api.log 2>&1 &
          wait_for_url "http://127.0.0.1:4010/healthz" "demo api" /tmp/ceq-demo-api.log

          pnpm --filter @customerEQ/demo-storefront exec next dev -p 3022 --hostname 127.0.0.1 >/tmp/ceq-demo-storefront.log 2>&1 &
          wait_for_url "http://127.0.0.1:3022/api/healthz" "demo storefront" /tmp/ceq-demo-storefront.log
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test
          REDIS_URL: redis://localhost:6379

      - name: Smoke Test Suite
        run: pnpm test:smoke
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test
          REDIS_URL: redis://localhost:6379
          PLAYWRIGHT_REUSE_DEMO_STOREFRONT_SERVER: 'true'
          # CI smoke relies on the suite runner's Azure base URL fallback.
          # Only the Azure/OpenAI API key must be present.

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  docker-build:
    name: Build production images
    runs-on: ubuntu-latest
    needs: ci
    # dorny/paths-filter@v3 calls the GitHub REST API listFiles endpoint to
    # determine the changed file set on pull_request events (it uses local git
    # diff on push events instead). The default GITHUB_TOKEN on this repo
    # lacks pull-requests: read, so without this block the action fails with
    # "Resource not accessible by integration" on the PR-event run that fires
    # alongside the push-event run. Surfaced on PR #346 run 25763238161.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Issue #343: skip image build on doc-only commits. Skip-list (negation)
      # semantics: paths-filter starts with everything (the leading '**' pattern)
      # and excludes anything matching a `!`-prefixed pattern. Returns true if
      # any file remains after exclusion. Skip-list over whitelist because
      # under-build (silent skip → stale-image deploy) is a real bug; over-build
      # (spurious rebuild on a doc pattern we forgot to list) is recoverable
      # wasted CI. New top-level dirs are default-included; only listed
      # patterns are skipped.
      #
      # Issue #351 (this fix): the leading '**' positive pattern is REQUIRED.
      # dorny/paths-filter uses last-match-wins semantics and needs a positive
      # pattern to seed the match set. With only negation patterns, dorny had
      # no baseline to subtract from and defaulted to true for every change,
      # making the skip path unreachable. PR #350 (doc-only) exposed this:
      # build steps ran while `Skip if doc-only` was skipped.
      - name: Determine if build is needed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!CODEOWNERS'
              - '!.gitattributes'
              - '!LICENSE'

      # Issue #351 (this fix): the previous `run: echo "...issue #343..."`
      # single-line form was truncated by the YAML parser at the `#` (inline
      # comment). Bash received an unterminated string and exited 2, failing
      # the job. Literal block scalar (|) preserves the value verbatim. The
      # `#` was also dropped from the message text (now "issue 343") as a
      # defense against future single-line refactors reintroducing the bug.
      - name: Skip if doc-only
        if: steps.changes.outputs.build == 'false'
        run: |
          echo "Doc-only change; skipping image build (issue 343)."

      - name: Set up Docker Buildx
        if: steps.changes.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        if: steps.changes.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          load: true
          tags: ceq-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # Module-resolution probe: catches BAML-class regressions (#273) at PR
      # time by running the built image with a one-shot dynamic import of
      # the @customerEQ/ai dist entry. Probe target is deliberately narrow —
      # importing the full app entry would couple this gate to env-var reads
      # and produce false positives in CI. We import the dist directly by
      # path rather than by package name because pnpm doesn't hoist workspace
      # packages to /app/node_modules; the dist path is stable across builds
      # and exercises the exact module tree that crashed in #273. CI is
      # complementary to the existing CD-side `Verify API health` gate.
      - name: Verify API image module resolution
        if: steps.changes.outputs.build == 'true'
        run: |
          docker run --rm --entrypoint node ceq-api:${{ github.sha }} \
            --input-type=module \
            -e "await import('/app/packages/ai/dist/index.js').then(()=>process.exit(0)).catch(e=>{console.error(e);process.exit(1)})"

      - name: Build worker image
        if: steps.changes.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          load: true
          tags: ceq-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Verify Worker image module resolution
        if: steps.changes.outputs.build == 'true'
        run: |
          docker run --rm --entrypoint node ceq-worker:${{ github.sha }} \
            --input-type=module \
            -e "await import('/app/packages/ai/dist/index.js').then(()=>process.exit(0)).catch(e=>{console.error(e);process.exit(1)})"

      - name: Build web image
        if: steps.changes.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: ceq-web:${{ github.sha }}
          # The dummy Clerk publishable key must be a valid pk_test_<base64>
          # because @clerk/nextjs decodes it at build time during page-data
          # collection. This value decodes to "clerk.example.com$" — it is
          # NOT a real key and produces no functional Clerk routes; it only
          # satisfies the SDK's format check so `next build` completes.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
