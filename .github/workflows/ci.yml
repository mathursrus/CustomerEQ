name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    # dorny/paths-filter@v3 calls the GitHub REST API listFiles endpoint on
    # pull_request events. The default GITHUB_TOKEN on this repo lacks
    # pull-requests: read — required since #346.
    # actions: read — required by scripts/ci-run-summary.mjs to call the
    # Actions API and read job/step timings for the Summary tab (#469).
    permissions:
      contents: read
      pull-requests: read
      actions: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_API: ${{ secrets.TURBO_API }}
      TURBO_TEAM: customereq

    services:
      postgres:
        # pgvector/pgvector:pg16 — required by migration 20260403000000_add_kb_articles
        # (CREATE EXTENSION vector). Mirrors local docker-compose per ADR-0002 / R20.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: customerEQ
          POSTGRES_PASSWORD: customerEQ
          POSTGRES_DB: customerEQ_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Issue #393: skip CI on doc-only commits. Leading '**' seeds the match
      # set (required — negation-only patterns default to true per #351). New
      # top-level dirs are default-included; only listed patterns are excluded.
      - name: Determine if CI is needed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!CODEOWNERS'
              - '!.gitattributes'
              - '!LICENSE'

      - name: Skip if doc-only
        if: steps.changes.outputs.build == 'false'
        run: |
          echo "Doc-only change; skipping CI (issue 393)."

      - name: Setup pnpm
        if: steps.changes.outputs.build == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.changes.outputs.build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.changes.outputs.build == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        if: steps.changes.outputs.build == 'true'
        run: pnpm --filter @customerEQ/database exec prisma validate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      - name: Check enum migration coverage
        if: steps.changes.outputs.build == 'true'
        run: bash packages/database/scripts/check-enum-migrations.sh

      - name: Generate Prisma client
        if: steps.changes.outputs.build == 'true'
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      # Regression gate for #270: every prior CI run skipped `migrate deploy`,
      # so a non-idempotent migration could land and only break on contributor
      # `pnpm db:reset` and on prod restore-from-migrations. Running the full
      # history against an empty postgres on every PR catches that class.
      - name: Run migrations (regression gate for #270)
        if: steps.changes.outputs.build == 'true'
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      - name: Build
        if: steps.changes.outputs.build == 'true'
        run: pnpm build

      # Issue #467: lightweight replacement for the removed docker-build job.
      # pnpm build above has already compiled packages/ai/dist. This one-shot
      # dynamic import verifies BAML-generated ESM modules resolve correctly in
      # the workspace module graph — the same class of regression that broke
      # prod in #273. Container-layout failures (pnpm hoisting vs /app layout)
      # are now caught by the CD health check and canary probes instead.
      - name: Verify BAML module resolution
        if: steps.changes.outputs.build == 'true'
        run: |
          node --input-type=module \
            -e "await import('./packages/ai/dist/index.js').then(()=>process.exit(0)).catch(e=>{console.error(e);process.exit(1)})"

      - name: Type check
        if: steps.changes.outputs.build == 'true'
        run: pnpm typecheck

      - name: Install Playwright browsers
        if: steps.changes.outputs.build == 'true'
        run: pnpm --filter @customerEQ/web exec playwright install --with-deps chromium

      - name: Validate smoke test secrets
        if: steps.changes.outputs.build == 'true'
        run: |
          test -n "$AZURE_OPENAI_API_KEY" || test -n "$OPENAI_API_KEY" || (echo "Missing AZURE_OPENAI_API_KEY / OPENAI_API_KEY" && exit 1)
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare smoke test env
        if: steps.changes.outputs.build == 'true'
        run: |
          if [ -n "$AZURE_OPENAI_API_KEY" ]; then
            echo "AZURE_OPENAI_API_KEY=$AZURE_OPENAI_API_KEY" >> "$GITHUB_ENV"
          else
            echo "AZURE_OPENAI_API_KEY=$OPENAI_API_KEY" >> "$GITHUB_ENV"
          fi
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Smoke Test Suite
        if: steps.changes.outputs.build == 'true'
        run: pnpm test:smoke
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test
          REDIS_URL: redis://localhost:6379
          CLERK_SECRET_KEY: sk_test_123
          # CI smoke relies on the suite runner's Azure base URL fallback.
          # Only the Azure/OpenAI API key must be present.

      - name: Upload coverage
        if: steps.changes.outputs.build == 'true'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      # Issue #469: write per-run step timing table to the Actions Summary tab.
      # Runs always so failures are also captured in the summary.
      - name: Write CI run summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci-run-summary.mjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Runs in parallel with ci — pnpm lint has no dependsOn in turbo.json.
    # permissions required for dorny/paths-filter on PR events (#346).
    permissions:
      contents: read
      pull-requests: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_API: ${{ secrets.TURBO_API }}
      TURBO_TEAM: customereq
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine if lint is needed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!CODEOWNERS'
              - '!.gitattributes'
              - '!LICENSE'

      - name: Skip if doc-only
        if: steps.changes.outputs.build == 'false'
        run: |
          echo "Doc-only change; skipping lint (issue 395)."

      - name: Setup pnpm
        if: steps.changes.outputs.build == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.changes.outputs.build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.changes.outputs.build == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.changes.outputs.build == 'true'
        run: pnpm lint

      # Issue #466: enforce no Docker Hub base image references in Dockerfiles.
      # All Dockerfiles must use an MCR-hosted or ACR-mirrored image as the
      # default NODE_IMAGE so that az acr build tasks don't hit Docker Hub's
      # unauthenticated pull rate limit.
      - name: Dockerfile base image lint
        run: |
          if grep -rE 'ARG NODE_IMAGE=node:|^FROM node:' Dockerfile.*; then
            echo "ERROR: Dockerfile(s) reference Docker Hub 'node:' image directly."
            echo "Use mcr.microsoft.com/devcontainers/javascript-node:22-bookworm as the default."
            exit 1
          fi
          echo "Dockerfile base image lint passed — no Docker Hub node references."
