name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: customerEQ
          POSTGRES_PASSWORD: customerEQ
          POSTGRES_DB: customerEQ_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @customerEQ/database exec prisma validate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      - name: Check enum migration coverage
        run: bash packages/database/scripts/check-enum-migrations.sh

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Unit & Integration Tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://customerEQ:customerEQ@localhost:5432/customerEQ_test
          REDIS_URL: redis://localhost:6379
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  docker-build:
    name: Build production images
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: ceq-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          tags: ceq-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: ceq-web:${{ github.sha }}
          # The dummy Clerk publishable key must be a valid pk_test_<base64>
          # because @clerk/nextjs decodes it at build time during page-data
          # collection. This value decodes to "clerk.example.com$" — it is
          # NOT a real key and produces no functional Clerk routes; it only
          # satisfies the SDK's format check so `next build` completes.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
