name: Deploy Dashboard

on:
  # Trigger after cd-metrics.yml completes — its commits use [skip ci] which
  # suppresses push-triggered workflows. workflow_run fires regardless.
  workflow_run:
    workflows: [CD Metrics]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: docs
          skip_app_build: true
          output_location: ''
