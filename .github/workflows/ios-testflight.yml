name: iOS TestFlight Build & Submit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-submit:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: apps/mobile
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ hashFiles('apps/mobile/ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Write .env for Metro bundler
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: |
          printf 'EXPO_PUBLIC_API_URL=%s\nEXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=%s\n' \
            "$EXPO_PUBLIC_API_URL" "$EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY" \
            > apps/mobile/.env

      - name: Import distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/dist.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/dist.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/dist.p12

      - name: Install provisioning profile
        id: profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          echo "uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

      - name: Write ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ steps.profile.outputs.uuid }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.customereq.mobile</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Patch Xcode project signing
        working-directory: apps/mobile/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ steps.profile.outputs.uuid }}
        run: |
          PBXPROJ="CustomerEQ.xcodeproj/project.pbxproj"
          echo "Team ID length: ${#APPLE_TEAM_ID}"
          # Replace empty/missing DEVELOPMENT_TEAM with our team ID
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = ${APPLE_TEAM_ID};/g" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = ${APPLE_TEAM_ID};/g" "$PBXPROJ"
          # Force manual signing
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          # Set provisioning profile specifier
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"CustomerEQ AppStore\";/g" "$PBXPROJ"
          # Verify
          echo "=== DEVELOPMENT_TEAM entries ==="
          grep "DEVELOPMENT_TEAM" "$PBXPROJ" || echo "(none found)"
          echo "=== CODE_SIGN_STYLE entries ==="
          grep "CODE_SIGN_STYLE" "$PBXPROJ" || echo "(none found)"

      - name: Build iOS archive
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ steps.profile.outputs.uuid }}
        run: |
          xcodebuild \
            -workspace ios/CustomerEQ.xcworkspace \
            -scheme CustomerEQ \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/CustomerEQ.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="CustomerEQ AppStore" \
            PROVISIONING_PROFILE="${PROFILE_UUID}" \
            archive

      - name: Export IPA
        working-directory: apps/mobile
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/CustomerEQ.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_PRIVATE_KEY" > \
            ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "apps/mobile/build/ipa/CustomerEQ.ipa" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --output-format xml
          STATUS=$?
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          exit $STATUS

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true
