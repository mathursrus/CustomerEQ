<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CustomerEQ — Spin Wheel Campaign (Mobile)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    padding: 20px;
  }
  .phone {
    width: 393px;
    height: 852px;
    background: #1e1b4b;
    border-radius: 48px;
    border: 2px solid #312e81;
    box-shadow: 0 0 0 8px #0f0e1a, 0 40px 120px rgba(0,0,0,0.9);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Stars background */
  .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; color: #fff; font-size: 12px; }

  /* Header */
  .campaign-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 16px;
    position: relative;
    z-index: 10;
  }
  .back-btn {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    border: none;
    color: #fff;
    backdrop-filter: blur(10px);
  }
  .campaign-title { font-size: 18px; font-weight: 700; color: #fff; text-align: center; }
  .pts-chip {
    background: rgba(251,191,36,0.2);
    border: 1px solid rgba(251,191,36,0.4);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #fbbf24;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Wheel section */
  .wheel-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 20px;
    position: relative;
    z-index: 10;
  }

  /* Prize description */
  .prize-desc {
    text-align: center;
    margin-bottom: 24px;
  }
  .prize-desc h2 {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
    background: linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .prize-desc p { font-size: 14px; color: rgba(255,255,255,0.6); }

  /* Wheel wrapper */
  .wheel-wrapper {
    position: relative;
    margin-bottom: 8px;
  }
  .wheel-pointer {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    z-index: 20;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .wheel-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%);
    animation: pulse-glow 2s infinite;
    pointer-events: none;
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.5; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  canvas { border-radius: 50%; }

  /* Spin result overlay */
  .result-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    border-radius: 48px;
  }
  .result-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }
  .result-card {
    background: #1e1b4b;
    border: 1px solid rgba(99,102,241,0.4);
    border-radius: 28px;
    padding: 36px 32px;
    text-align: center;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .result-emoji { font-size: 64px; margin-bottom: 16px; display: block; animation: bounce 0.6s ease; }
  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .result-title { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .result-pts {
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; }
  .result-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    transition: all 0.2s;
  }
  .result-btn:hover { transform: scale(0.99); }
  .confetti {
    position: fixed;
    pointer-events: none;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall 3s linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(900px) rotate(720deg); opacity: 0; }
  }

  /* Spin button */
  .spin-btn-wrapper {
    margin-top: 16px;
    margin-bottom: 20px;
  }
  .spin-btn {
    padding: 18px 48px;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 60px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.5), 0 0 0 3px rgba(99,102,241,0.2);
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .spin-btn:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 8px 30px rgba(99,102,241,0.6); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Prizes list */
  .prizes-strip {
    width: 100%;
    padding: 0 0 20px;
  }
  .prizes-label { font-size: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; text-align: center; }
  .prizes-list { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .prize-pill {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .prize-pill.jackpot { border-color: rgba(251,191,36,0.4); color: #fbbf24; background: rgba(251,191,36,0.1); }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>

  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">📶 🔋</div>
  </div>

  <!-- Header -->
  <div class="campaign-header">
    <button class="back-btn">‹</button>
    <span class="campaign-title">Spin & Win</span>
    <span class="pts-chip">⭐ 1 spin left</span>
  </div>

  <!-- Wheel section -->
  <div class="wheel-section">
    <div class="prize-desc">
      <h2>Win Up to 500 Points!</h2>
      <p>Spin the wheel for your daily reward from ACME Coffee</p>
    </div>

    <div class="wheel-wrapper">
      <div class="wheel-glow"></div>
      <div class="wheel-pointer">▼</div>
      <canvas id="spinWheel" width="280" height="280"></canvas>
    </div>

    <div class="spin-btn-wrapper">
      <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 SPIN!</button>
    </div>

    <div class="prizes-strip">
      <div class="prizes-label">Possible prizes</div>
      <div class="prizes-list">
        <span class="prize-pill jackpot">🏆 500 pts</span>
        <span class="prize-pill">⭐ 200 pts</span>
        <span class="prize-pill">⭐ 100 pts</span>
        <span class="prize-pill">☕ Free coffee</span>
        <span class="prize-pill">⭐ 50 pts</span>
        <span class="prize-pill">🎁 Try again</span>
      </div>
    </div>
  </div>

  <!-- Result overlay -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <span class="result-emoji" id="resultEmoji">🎉</span>
      <div class="result-title" id="resultTitle">You won!</div>
      <div class="result-pts" id="resultPts">+200 pts</div>
      <div class="result-sub" id="resultSub">Added to your ACME Coffee balance · Now 2,650 pts</div>
      <button class="result-btn" onclick="closeResult()">Awesome! 🎉</button>
    </div>
  </div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.opacity = Math.random() * 0.7 + 0.1;
    s.style.width = (Math.random() * 2 + 1) + 'px';
    s.style.height = s.style.width;
    starsEl.appendChild(s);
  }

  // Wheel setup
  const canvas = document.getElementById('spinWheel');
  const ctx = canvas.getContext('2d');
  const segments = [
    { label: '500 pts', color: '#f59e0b', prize: { emoji: '🏆', title: 'Jackpot!', pts: '+500 pts', sub: 'Added to your balance · Now 2,950 pts' }},
    { label: '50 pts',  color: '#6366f1', prize: { emoji: '⭐', title: 'Nice!', pts: '+50 pts', sub: 'Added to your balance · Now 2,500 pts' }},
    { label: '200 pts', color: '#059669', prize: { emoji: '🎉', title: 'You won!', pts: '+200 pts', sub: 'Added to your balance · Now 2,650 pts' }},
    { label: 'Try Again',color: '#475569',prize: { emoji: '😊', title: 'Better luck!', pts: 'No pts', sub: 'Come back tomorrow for another spin' }},
    { label: '100 pts', color: '#ef4444', prize: { emoji: '🎊', title: 'Sweet!', pts: '+100 pts', sub: 'Added to your balance · Now 2,550 pts' }},
    { label: '☕ Coffee',color: '#d97706', prize: { emoji: '☕', title: 'Free Coffee!', pts: 'Free Drip', sub: 'Redeem in the Rewards tab — valid 7 days' }},
    { label: '200 pts', color: '#7c3aed', prize: { emoji: '🎉', title: 'You won!', pts: '+200 pts', sub: 'Added to your balance · Now 2,650 pts' }},
    { label: '50 pts',  color: '#0891b2', prize: { emoji: '⭐', title: 'Nice!', pts: '+50 pts', sub: 'Added to your balance · Now 2,500 pts' }},
  ];

  let currentRotation = 0;
  let isSpinning = false;

  function drawWheel(rotation) {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = cx - 8;
    const n = segments.length;
    const arc = (Math.PI * 2) / n;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);

    segments.forEach((seg, i) => {
      const start = i * arc - Math.PI / 2;
      const end = start + arc;

      // Segment
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r, start, end);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      ctx.save();
      ctx.rotate(start + arc / 2);
      ctx.translate(r * 0.62, 0);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Word wrap if needed
      const words = seg.label.split(' ');
      if (words.length > 1) {
        ctx.fillText(words[0], 0, -7);
        ctx.fillText(words.slice(1).join(' '), 0, 7);
      } else {
        ctx.fillText(seg.label, 0, 0);
      }
      ctx.restore();
    });

    // Center circle
    ctx.beginPath();
    ctx.arc(0, 0, 28, 0, Math.PI * 2);
    ctx.fillStyle = '#1e1b4b';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Center logo
    ctx.fillStyle = '#fff';
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('☕', 0, 0);

    ctx.restore();

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  drawWheel(0);

  function spin() {
    if (isSpinning) return;
    isSpinning = true;
    document.getElementById('spinBtn').disabled = true;

    // Random winner (weighted: mostly small prizes)
    const winnerIdx = [2, 1, 4, 7, 6, 3, 5][Math.floor(Math.random() * 7)]; // index into segments
    const segAngle = (Math.PI * 2) / segments.length;
    const targetAngle = -(winnerIdx * segAngle + segAngle / 2);
    const extraSpins = (6 + Math.random() * 3) * Math.PI * 2;
    const finalRotation = targetAngle - extraSpins;

    const duration = 4500;
    const start = performance.now();
    const startRot = currentRotation;

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function animate(now) {
      const elapsed = now - start;
      const t = Math.min(elapsed / duration, 1);
      const eased = easeOut(t);
      const rotation = startRot + (finalRotation - startRot) * eased;
      drawWheel(rotation);
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        currentRotation = rotation % (Math.PI * 2);
        isSpinning = false;
        showResult(winnerIdx);
      }
    }

    requestAnimationFrame(animate);
  }

  function showResult(winnerIdx) {
    const prize = segments[winnerIdx].prize;
    document.getElementById('resultEmoji').textContent = prize.emoji;
    document.getElementById('resultTitle').textContent = prize.title;
    document.getElementById('resultPts').textContent = prize.pts;
    document.getElementById('resultSub').textContent = prize.sub;
    document.getElementById('resultOverlay').classList.add('visible');
    spawnConfetti();
  }

  function closeResult() {
    document.getElementById('resultOverlay').classList.remove('visible');
    document.getElementById('spinBtn').textContent = '✅ Spun today';
    document.getElementById('spinBtn').disabled = true;
    document.querySelector('.pts-chip').textContent = '⭐ 0 spins left';
  }

  function spawnConfetti() {
    const colors = ['#fbbf24', '#6366f1', '#059669', '#ef4444', '#fff'];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top = '30%';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDelay = Math.random() * 0.5 + 's';
      el.style.animationDuration = (2 + Math.random() * 2) + 's';
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = el.style.width;
      document.querySelector('.phone').appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }
</script>
</body>
</html>
