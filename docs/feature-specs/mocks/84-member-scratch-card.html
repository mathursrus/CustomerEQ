<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch & Win — Member Experience</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; }
  .page { text-align: center; width: 100%; max-width: 400px; padding: 20px; }
  .brand { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .title { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 28px; }
  .card-wrapper { position: relative; width: 320px; height: 200px; margin: 0 auto 20px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.1); }
  .prize-layer { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .prize-emoji { font-size: 48px; margin-bottom: 8px; }
  .prize-text { font-size: 22px; font-weight: 700; color: #059669; }
  .prize-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }
  #scratchCanvas { position: absolute; inset: 0; cursor: crosshair; touch-action: none; transition: opacity 0.6s ease; }
  .hint { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
  .result-card { display: none; background: #fff; border-radius: 16px; padding: 28px; text-align: center; color: #1f2937; margin-top: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .result-card.show { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result-title { font-size: 20px; font-weight: 700; color: #059669; margin-bottom: 4px; }
  .result-prize { font-size: 16px; font-weight: 600; color: #1f2937; }
  .result-msg { font-size: 13px; color: #6b7280; margin-top: 8px; }
  .powered { position: fixed; bottom: 10px; font-size: 10px; color: rgba(255,255,255,0.25); }
  .progress-bar { width: 320px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 0 auto 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: #fbbf24; width: 0%; transition: width 0.2s; border-radius: 2px; }
  /* Sparkles */
  @keyframes sparkle { 0% { opacity: 1; transform: scale(0) rotate(0deg); } 50% { opacity: 1; transform: scale(1) rotate(180deg); } 100% { opacity: 0; transform: scale(0.5) rotate(360deg); } }
  .sparkle { position: absolute; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; animation: sparkle 0.8s ease-out forwards; }
</style>
</head>
<body>

<div class="page">
  <div class="brand">Acme Rewards</div>
  <div class="title">Scratch & Win!</div>
  <div class="subtitle">You earned a scratch card from your recent purchase</div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="hint" id="hint">Scratch the card to reveal your prize</div>

  <div class="card-wrapper" id="cardWrapper">
    <div class="prize-layer">
      <div class="prize-emoji">☕</div>
      <div class="prize-text">Free Coffee!</div>
      <div class="prize-sub">Show this at any Acme location</div>
    </div>
    <canvas id="scratchCanvas" width="320" height="200"></canvas>
  </div>

  <div class="result-card" id="resultCard">
    <div style="font-size:40px;margin-bottom:8px;">🎉</div>
    <div class="result-title">Congratulations!</div>
    <div class="result-prize">Free Coffee!</div>
    <div class="result-msg">Your reward has been added to your account.</div>
  </div>

  <div class="powered">Powered by CustomerEQ</div>
</div>

<script>
  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  const progressFill = document.getElementById('progressFill');
  const hint = document.getElementById('hint');
  const resultCard = document.getElementById('resultCard');
  const cardWrapper = document.getElementById('cardWrapper');
  let isDrawing = false;
  let revealed = false;
  let totalPixels = 320 * 200;

  // Draw gold foil overlay
  const grad = ctx.createLinearGradient(0, 0, 320, 200);
  grad.addColorStop(0, '#D4AF37');
  grad.addColorStop(0.2, '#F5E6A3');
  grad.addColorStop(0.4, '#D4AF37');
  grad.addColorStop(0.6, '#E8C94B');
  grad.addColorStop(0.8, '#C5982C');
  grad.addColorStop(1, '#D4AF37');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 320, 200);

  // Add subtle noise texture
  for (let i = 0; i < 2000; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.15})`;
    ctx.fillRect(Math.random() * 320, Math.random() * 200, 1, 1);
  }

  // Scratch text
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 18px Inter, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Scratch to reveal!', 160, 100);

  // Decorative border
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(8, 8, 304, 184);

  function getPercentScratched() {
    const imageData = ctx.getImageData(0, 0, 320, 200);
    let transparent = 0;
    for (let i = 3; i < imageData.data.length; i += 4) {
      if (imageData.data[i] === 0) transparent++;
    }
    return (transparent / totalPixels) * 100;
  }

  function createSparkles() {
    const colors = ['#fbbf24', '#f59e0b', '#fff', '#10b981', '#4f46e5'];
    const wrapper = cardWrapper;
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.style.left = Math.random() * 320 + 'px';
      el.style.top = Math.random() * 200 + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDelay = (Math.random() * 0.3) + 's';
      wrapper.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }
  }

  function scratch(x, y) {
    if (revealed) return;
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 22, 0, Math.PI * 2);
    ctx.fill();

    // Also scratch with a softer edge
    ctx.beginPath();
    ctx.arc(x, y, 28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fill();

    const pct = getPercentScratched();
    progressFill.style.width = Math.min(pct / 0.6 * 100, 100) + '%';

    if (pct >= 60 && !revealed) {
      revealed = true;
      canvas.style.opacity = '0';
      hint.textContent = 'Prize revealed!';
      createSparkles();
      setTimeout(() => {
        resultCard.classList.add('show');
      }, 600);
    }
  }

  canvas.addEventListener('mousedown', (e) => { isDrawing = true; const r = canvas.getBoundingClientRect(); scratch(e.clientX - r.left, e.clientY - r.top); });
  canvas.addEventListener('mouseup', () => isDrawing = false);
  canvas.addEventListener('mouseleave', () => isDrawing = false);
  canvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    const r = canvas.getBoundingClientRect();
    scratch(e.clientX - r.left, e.clientY - r.top);
  });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; const t = e.touches[0]; const r = canvas.getBoundingClientRect(); scratch(t.clientX - r.left, t.clientY - r.top); });
  canvas.addEventListener('touchend', () => isDrawing = false);
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    scratch(t.clientX - r.left, t.clientY - r.top);
  });
</script>
</body>
</html>
